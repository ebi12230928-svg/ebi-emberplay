services:
  - type: web
    name: emberplay
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: INITIAL_ADMIN_USERNAME
        value: change-me
      - key: DATABASE_URL
        sync: false
