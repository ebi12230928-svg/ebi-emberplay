{% extends "base.html" %}
{% block title %}Number Match ・ EMBERPLAY{% endblock %}

{% block content %}
<span class="eyebrow">🔢 Number Match</span>
<h1>Number Match</h1>
<p>1〜10の数字を1つ選んで的中させると{{ payout }}倍。</p>

<div class="game-layout">
  <div class="panel">
    <div class="field">
      <label for="wager">プレイ料</label>
      <input type="number" id="wager" value="100" min="1">
    </div>
    <div class="grid-5">
      {% for n in range(1, 11) %}
      <button class="btn btn-ghost pick-btn" data-pick="{{ n }}">{{ n }}</button>
      {% endfor %}
    </div>
  </div>

  <div>
    <div class="game-stage" style="flex-direction: column; gap: 16px;">
      <div id="result-number" style="font-size: 64px; font-weight: 800;">❔</div>
      <div class="result-readout" id="result-readout"></div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/numbermatch.js') }}"></script>
{% endblock %}
