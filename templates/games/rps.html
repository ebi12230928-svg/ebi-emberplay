{% extends "base.html" %}
{% block title %}Rock Paper Scissors ・ EMBERPLAY{% endblock %}

{% block content %}
<span class="eyebrow">Rock Paper Scissors</span>
<h1>Rock Paper Scissors</h1>
<p>ハウスとのじゃんけん勝負。引き分けはプッシュ(返金)、勝てば{{ multiplier }}倍。</p>

<div class="game-layout">
  <div class="stake-bet-panel">
    <div class="stake-bet-label"><span>プレイ料</span><span>💰 Embers</span></div>
    <div class="stake-bet-row">
      <input type="number" id="wager" value="100" min="1">
      <div class="stake-bet-adjust">
        <button type="button" id="wager-half">½</button>
        <button type="button" id="wager-double">2×</button>
      </div>
    </div>
    <div class="stake-chip-row">
      <button type="button" class="wager-chip" data-amount="50">50</button>
      <button type="button" class="wager-chip" data-amount="100">100</button>
      <button type="button" class="wager-chip" data-amount="500">500</button>
      <button type="button" class="wager-chip" data-amount="1000">1000</button>
    </div>
    <div style="display:flex; gap: 10px; flex-wrap: wrap;">
      <button class="btn btn-ember" id="rock-btn" style="flex:1;">✊ Rock</button>
      <button class="btn btn-ember" id="paper-btn" style="flex:1;">✋ Paper</button>
      <button class="btn btn-ember" id="scissors-btn" style="flex:1;">✌️ Scissors</button>
    </div>
  </div>

  <div>
    <div class="game-stage" style="flex-direction: column; gap: 16px;">
      <div style="display:flex; gap: 40px; font-size: 48px; flex-wrap: wrap;">
        <div style="text-align:center;">
          <div class="eyebrow">You</div>
          <div id="player-choice">❔</div>
        </div>
        <div style="text-align:center;">
          <div class="eyebrow">House</div>
          <div id="house-choice">❔</div>
        </div>
      </div>
      <div class="result-readout" id="result-readout"></div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/rps.js') }}"></script>
{% endblock %}
