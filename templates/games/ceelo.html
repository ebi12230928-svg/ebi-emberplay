{% extends "base.html" %}
{% block title %}Cee-lo ・ EMBERPLAY{% endblock %}

{% block content %}
<span class="eyebrow">Cee-lo</span>
<h1>Cee-lo</h1>
<p>3つのサイコロを振って、4-5-6の目かゾロ目が出れば勝ち({{ payout }}倍)の中国の伝統ゲームです。</p>

<div class="game-layout">
  <div class="panel">
    <div class="field">
      <label for="wager">プレイ料</label>
      <input type="number" id="wager" value="100" min="1">
    </div>
    <button class="btn btn-ember btn-block" id="roll-btn">振る</button>
  </div>

  <div>
    <div class="game-stage" style="flex-direction: column; gap: 16px;">
      <div style="display:flex; gap: 12px; font-size: 44px; flex-wrap: wrap;">
        <div id="die-0">🎲</div>
        <div id="die-1">🎲</div>
        <div id="die-2">🎲</div>
      </div>
      <div class="result-readout" id="result-readout"></div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/ceelo.js') }}"></script>
{% endblock %}
