{% extends "base.html" %}
{% block title %}Roulette ・ EMBERPLAY{% endblock %}

{% block content %}
<span class="eyebrow">European Roulette</span>
<h1>Roulette</h1>
{% include "_live_banner.html" %}

<div class="game-layout">
  <div class="stake-bet-panel">
    <div class="stake-bet-label"><span>プレイ料</span><span>💰 Embers</span></div>
    <div class="stake-bet-row">
      <input type="number" id="wager" value="100" min="1">
      <div class="stake-bet-adjust">
        <button type="button" id="wager-half">½</button>
        <button type="button" id="wager-double">2×</button>
      </div>
    </div>
    <div class="stake-chip-row">
      <button type="button" class="wager-chip" data-amount="50">50</button>
      <button type="button" class="wager-chip" data-amount="100">100</button>
      <button type="button" class="wager-chip" data-amount="500">500</button>
      <button type="button" class="wager-chip" data-amount="1000">1000</button>
    </div>
    <div class="field">
      <label for="bet-type">選択の種類</label>
      <select id="bet-type">
        <option value="straight">Straight(単一数字・36倍)</option>
        <option value="red">Red(2倍)</option>
        <option value="black">Black(2倍)</option>
        <option value="odd">Odd(2倍)</option>
        <option value="even">Even(2倍)</option>
        <option value="low">Low 1-18(2倍)</option>
        <option value="high">High 19-36(2倍)</option>
        <option value="dozen1">1st Dozen 1-12(3倍)</option>
        <option value="dozen2">2nd Dozen 13-24(3倍)</option>
        <option value="dozen3">3rd Dozen 25-36(3倍)</option>
        <option value="col1">Column 1(3倍)</option>
        <option value="col2">Column 2(3倍)</option>
        <option value="col3">Column 3(3倍)</option>
      </select>
    </div>
    <div class="field" id="straight-field">
      <label for="straight-value">数字(0〜36)</label>
      <input type="number" id="straight-value" value="0" min="0" max="36">
    </div>
    <button class="btn btn-ember btn-block" id="spin-btn">スピン</button>
  </div>

  <div>
    <div class="game-stage casino-felt-table" style="flex-direction: column; align-items:center;">
      <div id="roulette-wheel-wrap" style="position:relative; width: 220px; height: 220px; margin: 0 auto 12px;">
        <svg id="roulette-wheel" viewBox="0 0 220 220" style="width:100%; height:100%; transition: transform 4s cubic-bezier(0.15, 0.9, 0.1, 1); filter: drop-shadow(0 6px 14px rgba(0,0,0,0.5));"></svg>
        <div id="roulette-ball" style="position:absolute; width:10px; height:10px; border-radius:50%; background:#fff; top:6px; left:105px; box-shadow:0 0 4px rgba(0,0,0,0.6); transition: transform 4s cubic-bezier(0.15, 0.9, 0.1, 1);"></div>
        <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none;">
          <div style="width:40px; height:40px; border-radius:50%; background:#3d2415; box-shadow:0 2px 6px rgba(0,0,0,0.5); border:3px solid #d4a24e;"></div>
        </div>
      </div>
      <div class="result-readout" id="result-readout" style="color:#fff;">--</div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/roulette.js') }}"></script>
{% endblock %}
