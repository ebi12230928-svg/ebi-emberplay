{% extends "base.html" %}
{% block title %}Plinko ・ EMBERPLAY{% endblock %}

{% block content %}
<span class="eyebrow">Plinko</span>
<h1>Plinko</h1>

<div class="game-layout">
  <div class="stake-bet-panel">
    <div class="stake-bet-label"><span>プレイ料</span><span>💰 Embers</span></div>
    <div class="stake-bet-row">
      <input type="number" id="wager" value="100" min="1">
      <div class="stake-bet-adjust">
        <button type="button" id="wager-half">½</button>
        <button type="button" id="wager-double">2×</button>
      </div>
    </div>
    <div class="stake-chip-row">
      <button type="button" class="wager-chip" data-amount="50">50</button>
      <button type="button" class="wager-chip" data-amount="100">100</button>
      <button type="button" class="wager-chip" data-amount="500">500</button>
      <button type="button" class="wager-chip" data-amount="1000">1000</button>
    </div>
    <div class="field">
      <label for="rows">行数</label>
      <select id="rows">
        {% for r in rows_options %}
        <option value="{{ r }}" {% if r == 16 %}selected{% endif %}>{{ r }}行</option>
        {% endfor %}
      </select>
    </div>
    <div class="field">
      <label for="risk">リスク</label>
      <select id="risk">
        <option value="low">Low</option>
        <option value="medium" selected>Medium</option>
        <option value="high">High</option>
      </select>
    </div>
    <button class="btn btn-ember btn-block" id="drop-btn">ドロップ</button>
  </div>

  <div>
    <div class="game-stage" style="flex-direction: column; gap: 16px;">
      <div id="peg-board" style="display:flex; flex-direction:column; gap:8px; width:100%;"></div>
      <div class="result-readout" id="result-readout">--</div>
      <div id="bucket-row" style="display:flex; gap:4px; width:100%; justify-content:center; flex-wrap:wrap;"></div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/plinko.js') }}"></script>
{% endblock %}
