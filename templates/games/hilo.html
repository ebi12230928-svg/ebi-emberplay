{% extends "base.html" %}
{% block title %}HiLo ・ EMBERPLAY{% endblock %}

{% block content %}
<span class="eyebrow">HiLo</span>
<h1>HiLo</h1>
<p style="margin: -8px 0 12px;"><button type="button" data-cancel-url="/games/hilo/cancel" class="btn btn-ghost" style="font-size: 11px; padding: 4px 10px;">動かなくなった場合はこちら(強制リセット・全額返金)</button></p>

<div class="game-layout">
  <div class="stake-bet-panel">
    <div class="stake-bet-label"><span>プレイ料</span><span>💰 Embers</span></div>
    <div class="stake-bet-row">
      <input type="number" id="wager" value="100" min="1">
      <div class="stake-bet-adjust">
        <button type="button" id="wager-half">½</button>
        <button type="button" id="wager-double">2×</button>
      </div>
    </div>
    <div class="stake-chip-row">
      <button type="button" class="wager-chip" data-amount="50">50</button>
      <button type="button" class="wager-chip" data-amount="100">100</button>
      <button type="button" class="wager-chip" data-amount="500">500</button>
      <button type="button" class="wager-chip" data-amount="1000">1000</button>
    </div>
    <button class="btn btn-ember btn-block" id="start-btn">開始</button>
    <div style="display:flex; gap: 10px; margin-top: 12px; flex-wrap: wrap;">
      <button class="btn btn-ghost" id="higher-btn" style="flex:1;" disabled>Higher</button>
      <button class="btn btn-ghost" id="lower-btn" style="flex:1;" disabled>Lower</button>
    </div>
    <button class="btn btn-ghost btn-block" id="pass-btn" style="margin-top: 10px;" disabled>パス(<span id="passes-left" data-max="{{ max_passes }}">{{ max_passes }}</span>回まで)</button>
    <button class="btn btn-ghost btn-block" id="cashout-btn" style="margin-top: 10px;" disabled>キャッシュアウト</button>

    <hr class="divider">
    <div class="field">
      <label>現在の倍率</label>
      <div class="mono" id="multiplier-readout" style="font-size: 24px;">1.0000x</div>
    </div>
  </div>

  <div>
    <div class="game-stage">
      <div class="result-readout" id="card-readout">--</div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/hilo.js') }}"></script>
{% endblock %}
