{% extends "base.html" %}
{% block title %}HiLo ・ EMBERPLAY{% endblock %}

{% block content %}
<span class="eyebrow">HiLo</span>
<h1>HiLo</h1>

<div class="game-layout">
  <div class="panel">
    <div class="field">
      <label for="wager">プレイ料</label>
      <input type="number" id="wager" value="100" min="1">
    </div>
    <button class="btn btn-ember btn-block" id="start-btn">開始</button>
    <div style="display:flex; gap: 10px; margin-top: 12px;">
      <button class="btn btn-ghost" id="higher-btn" style="flex:1;" disabled>Higher</button>
      <button class="btn btn-ghost" id="lower-btn" style="flex:1;" disabled>Lower</button>
    </div>
    <button class="btn btn-ghost btn-block" id="pass-btn" style="margin-top: 10px;" disabled>パス(<span id="passes-left" data-max="{{ max_passes }}">{{ max_passes }}</span>回まで)</button>
    <button class="btn btn-ghost btn-block" id="cashout-btn" style="margin-top: 10px;" disabled>キャッシュアウト</button>

    <hr class="divider">
    <div class="field">
      <label>現在の倍率</label>
      <div class="mono" id="multiplier-readout" style="font-size: 24px;">1.0000x</div>
    </div>
  </div>

  <div>
    <div class="game-stage">
      <div class="result-readout" id="card-readout">--</div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/hilo.js') }}"></script>
{% endblock %}
