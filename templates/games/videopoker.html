{% extends "base.html" %}
{% block title %}Video Poker ・ EMBERPLAY{% endblock %}

{% block content %}
<span class="eyebrow">Jacks or Better</span>
<h1>Video Poker</h1>
<p style="margin: -8px 0 12px;"><button type="button" data-cancel-url="/games/videopoker/cancel" class="btn btn-ghost" style="font-size: 11px; padding: 4px 10px;">動かなくなった場合はこちら(強制リセット・全額返金)</button></p>

<div class="game-layout">
  <div class="stake-bet-panel">
    <div class="stake-bet-label"><span>プレイ料</span><span>💰 Embers</span></div>
    <div class="stake-bet-row">
      <input type="number" id="wager" value="100" min="1">
      <div class="stake-bet-adjust">
        <button type="button" id="wager-half">½</button>
        <button type="button" id="wager-double">2×</button>
      </div>
    </div>
    <div class="stake-chip-row">
      <button type="button" class="wager-chip" data-amount="50">50</button>
      <button type="button" class="wager-chip" data-amount="100">100</button>
      <button type="button" class="wager-chip" data-amount="500">500</button>
      <button type="button" class="wager-chip" data-amount="1000">1000</button>
    </div>
    <button class="btn btn-ember btn-block" id="deal-btn">配る</button>
    <button class="btn btn-ghost btn-block" id="draw-btn" style="margin-top: 10px;" disabled>ドロー</button>

    <hr class="divider">
    <table style="font-size: 12px;">
      {% for label, mult in paytable %}
      <tr><td>{{ label }}</td><td class="mono" style="text-align:right;">{{ mult }}x</td></tr>
      {% endfor %}
    </table>
  </div>

  <div>
    <div class="game-stage" style="flex-direction: column; gap: 24px;">
      <div id="hand" style="display:flex; gap: 10px; font-size: 32px; flex-wrap: wrap;"></div>
      <div class="result-readout" id="result-readout"></div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/videopoker.js') }}"></script>
{% endblock %}
