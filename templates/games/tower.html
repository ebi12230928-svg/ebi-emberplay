{% extends "base.html" %}
{% block title %}Tower ・ EMBERPLAY{% endblock %}

{% block content %}
<span class="eyebrow">Dragon Tower</span>
<h1>Tower</h1>
<p style="margin: -8px 0 12px;"><button type="button" data-cancel-url="/games/tower/cancel" class="btn btn-ghost" style="font-size: 11px; padding: 4px 10px;">動かなくなった場合はこちら(強制リセット・全額返金)</button></p>

<div class="game-layout">
  <div class="panel">
    <div class="field">
      <label for="wager">プレイ料</label>
      <input type="number" id="wager" value="100" min="1">
    </div>
    <div class="field">
      <label for="difficulty">難易度</label>
      <select id="difficulty">
        {% for d in difficulties %}
        <option value="{{ d }}" {% if d == "medium" %}selected{% endif %}>{{ d }}</option>
        {% endfor %}
      </select>
    </div>
    <button class="btn btn-ember btn-block" id="start-btn">開始</button>
    <button class="btn btn-ghost btn-block" id="cashout-btn" style="margin-top: 10px;" disabled>キャッシュアウト</button>

    <hr class="divider">
    <div class="field">
      <label>現在の倍率</label>
      <div class="mono" id="multiplier-readout" style="font-size: 24px;">1.0000x</div>
    </div>
  </div>

  <div>
    <div class="game-stage">
      <div id="tower-rows" style="display:flex; flex-direction:column-reverse; gap:8px; width:100%; max-width: 360px;" data-total-rows="{{ total_rows }}"></div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/tower.js') }}"></script>
{% endblock %}
