{% extends "base.html" %}
{% block title %}Crash ・ EMBERPLAY{% endblock %}

{% block content %}
<span class="eyebrow">Crash</span>
<h1>Crash</h1>
<p style="margin: -8px 0 12px;"><button type="button" data-cancel-url="/games/crash/cancel" class="btn btn-ghost" style="font-size: 11px; padding: 4px 10px;">動かなくなった場合はこちら(強制リセット・全額返金)</button></p>
<p>倍率が上昇し続けます。バーストする前に自分のタイミングでキャッシュアウトしてください。</p>

<div class="game-layout">
  <div class="stake-bet-panel">
    <div class="stake-bet-label"><span>プレイ料</span><span>💰 Embers</span></div>
    <div class="stake-bet-row">
      <input type="number" id="wager" value="100" min="1">
      <div class="stake-bet-adjust">
        <button type="button" id="wager-half">½</button>
        <button type="button" id="wager-double">2×</button>
      </div>
    </div>
    <div class="stake-chip-row">
      <button type="button" class="wager-chip" data-amount="50">50</button>
      <button type="button" class="wager-chip" data-amount="100">100</button>
      <button type="button" class="wager-chip" data-amount="500">500</button>
      <button type="button" class="wager-chip" data-amount="1000">1000</button>
    </div>
    <button class="btn btn-ember btn-block" id="start-btn">スタート</button>
    <button class="btn btn-ghost btn-block" id="cashout-btn" style="margin-top: 10px;" disabled>キャッシュアウト</button>
  </div>

  <div>
    <div class="game-stage">
      <div class="limbo-multiplier" id="multiplier-readout">1.00x</div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/crash.js') }}"></script>
{% endblock %}
