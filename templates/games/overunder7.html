{% extends "base.html" %}
{% block title %}Over/Under 7 ・ EMBERPLAY{% endblock %}

{% block content %}
<span class="eyebrow">Over/Under 7</span>
<h1>Over/Under 7</h1>
<p>2つのサイコロの合計が7より小さいか、大きいか、ちょうど7かを予想します。</p>

<div class="game-layout">
  <div class="panel">
    <div class="field">
      <label for="wager">プレイ料</label>
      <input type="number" id="wager" value="100" min="1">
    </div>
    <div style="display:flex; gap: 8px; flex-wrap: wrap;">
      <button class="btn btn-ember pick-btn" data-pick="under" style="flex:1;">Under 7<br>{{ payouts.under }}x</button>
      <button class="btn btn-ember pick-btn" data-pick="seven" style="flex:1;">= 7<br>{{ payouts.seven }}x</button>
      <button class="btn btn-ember pick-btn" data-pick="over" style="flex:1;">Over 7<br>{{ payouts.over }}x</button>
    </div>
  </div>

  <div>
    <div class="game-stage" style="flex-direction: column; gap: 16px;">
      <div style="display:flex; gap: 16px; font-size: 48px; flex-wrap: wrap;">
        <div id="die-0">🎲</div>
        <div id="die-1">🎲</div>
      </div>
      <div class="result-readout" id="result-readout"></div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/overunder7.js') }}"></script>
{% endblock %}
