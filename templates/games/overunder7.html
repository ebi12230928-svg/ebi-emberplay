{% extends "base.html" %}
{% block title %}Over/Under 7 ・ EMBERPLAY{% endblock %}

{% block content %}
<span class="eyebrow">Over/Under 7</span>
<h1>Over/Under 7</h1>
<p>2つのサイコロの合計が7より小さいか、大きいか、ちょうど7かを予想します。</p>

<div class="game-layout">
  <div class="stake-bet-panel">
    <div class="stake-bet-label"><span>プレイ料</span><span>💰 Embers</span></div>
    <div class="stake-bet-row">
      <input type="number" id="wager" value="100" min="1">
      <div class="stake-bet-adjust">
        <button type="button" id="wager-half">½</button>
        <button type="button" id="wager-double">2×</button>
      </div>
    </div>
    <div class="stake-chip-row">
      <button type="button" class="wager-chip" data-amount="50">50</button>
      <button type="button" class="wager-chip" data-amount="100">100</button>
      <button type="button" class="wager-chip" data-amount="500">500</button>
      <button type="button" class="wager-chip" data-amount="1000">1000</button>
    </div>
    <div style="display:flex; gap: 8px; flex-wrap: wrap;">
      <button class="btn btn-ember pick-btn" data-pick="under" style="flex:1;">Under 7<br>{{ payouts.under }}x</button>
      <button class="btn btn-ember pick-btn" data-pick="seven" style="flex:1;">= 7<br>{{ payouts.seven }}x</button>
      <button class="btn btn-ember pick-btn" data-pick="over" style="flex:1;">Over 7<br>{{ payouts.over }}x</button>
    </div>
  </div>

  <div>
    <div class="game-stage" style="flex-direction: column; gap: 16px;">
      <div style="display:flex; gap: 16px; font-size: 48px; flex-wrap: wrap;">
        <div id="die-0">🎲</div>
        <div id="die-1">🎲</div>
      </div>
      <div class="result-readout" id="result-readout"></div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/overunder7.js') }}"></script>
{% endblock %}
