{% extends "base.html" %}
{% block title %}Blackjack ・ EMBERPLAY{% endblock %}

{% block content %}
<span class="eyebrow">Blackjack</span>
<h1>Blackjack</h1>
{% include "_live_banner.html" %}

<div class="game-layout">
  <div class="panel">
    <div class="field">
      <label for="wager">プレイ料</label>
      <input type="number" id="wager" value="100" min="1">
    </div>
    <button class="btn btn-ember btn-block" id="start-btn">配る</button>
    <div style="display:flex; gap: 10px; margin-top: 12px;">
      <button class="btn btn-ghost" id="hit-btn" style="flex:1;" disabled>Hit</button>
      <button class="btn btn-ghost" id="stand-btn" style="flex:1;" disabled>Stand</button>
    </div>
    <button class="btn btn-ghost btn-block" id="double-btn" style="margin-top: 10px;" disabled>Double Down</button>
  </div>

  <div>
    <div class="game-stage" style="flex-direction: column; gap: 24px; align-items: stretch;">
      <div>
        <div class="eyebrow">Dealer</div>
        <div class="mono" id="dealer-hand" style="font-size: 28px;">--</div>
        <div class="mono text-muted" id="dealer-total"></div>
      </div>
      <hr class="divider" style="margin: 0;">
      <div>
        <div class="eyebrow">You</div>
        <div class="mono" id="player-hand" style="font-size: 28px;">--</div>
        <div class="mono text-muted" id="player-total"></div>
      </div>
      <div class="result-readout" id="result-readout"></div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/blackjack.js') }}"></script>
{% endblock %}
