{% extends "base.html" %}
{% block title %}Blackjack ・ EMBERPLAY{% endblock %}

{% block content %}
<span class="eyebrow">Blackjack</span>
<h1>Blackjack</h1>
<p style="margin: -8px 0 12px;"><button type="button" data-cancel-url="/games/blackjack/cancel" class="btn btn-ghost" style="font-size: 11px; padding: 4px 10px;">動かなくなった場合はこちら(強制リセット・全額返金)</button></p>
{% include "_live_banner.html" %}

<div class="game-layout">
  <div class="stake-bet-panel">
    <div class="stake-bet-label"><span>プレイ料</span><span id="wager-embers-label">💰 Embers</span></div>
    <div class="stake-bet-row">
      <input type="number" id="wager" value="100" min="1">
      <div class="stake-bet-adjust">
        <button type="button" id="wager-half">½</button>
        <button type="button" id="wager-double">2×</button>
      </div>
    </div>
    <div class="stake-chip-row">
      <button type="button" class="wager-chip" data-amount="50">50</button>
      <button type="button" class="wager-chip" data-amount="100">100</button>
      <button type="button" class="wager-chip" data-amount="500">500</button>
      <button type="button" class="wager-chip" data-amount="1000">1000</button>
    </div>
    <button class="btn btn-ember btn-block" id="start-btn" style="margin-top: 14px;">配る</button>
    <div class="stake-action-bar">
      <button class="btn btn-ghost" id="hit-btn" disabled>Hit</button>
      <button class="btn btn-ghost" id="stand-btn" disabled>Stand</button>
    </div>
    <button class="btn btn-ghost btn-block" id="double-btn" style="margin-top: 8px;" disabled>Double Down</button>
  </div>

  <div>
    <div class="game-stage casino-felt-table" style="flex-direction: column; gap: 24px; align-items: stretch;">
      <div>
        <div class="eyebrow" style="color: #fff;">Dealer</div>
        <div id="dealer-hand" style="min-height: 90px;">--</div>
        <div class="mono" id="dealer-total" style="color: #fff; margin-top: 6px;"></div>
      </div>
      <hr class="divider" style="margin: 0; background: rgba(255,255,255,0.15);">
      <div>
        <div class="eyebrow" style="color: #fff;">You</div>
        <div id="player-hand" style="min-height: 90px;">--</div>
        <div class="mono" id="player-total" style="color: #fff; margin-top: 6px;"></div>
      </div>
      <div class="result-readout" id="result-readout"></div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/card_visuals.js') }}"></script>
<script src="{{ url_for('static', filename='js/blackjack.js') }}"></script>
{% endblock %}
