{% extends "base.html" %}
{% block title %}War ・ EMBERPLAY{% endblock %}

{% block content %}
<span class="eyebrow">War</span>
<h1>War</h1>
<p style="margin: -8px 0 12px;"><button type="button" data-cancel-url="/games/war/cancel" class="btn btn-ghost" style="font-size: 11px; padding: 4px 10px;">動かなくなった場合はこちら(強制リセット・全額返金)</button></p>

<div class="game-layout">
  <div class="stake-bet-panel">
    <div class="stake-bet-label"><span>プレイ料</span><span>💰 Embers</span></div>
    <div class="stake-bet-row">
      <input type="number" id="wager" value="100" min="1">
      <div class="stake-bet-adjust">
        <button type="button" id="wager-half">½</button>
        <button type="button" id="wager-double">2×</button>
      </div>
    </div>
    <div class="stake-chip-row">
      <button type="button" class="wager-chip" data-amount="50">50</button>
      <button type="button" class="wager-chip" data-amount="100">100</button>
      <button type="button" class="wager-chip" data-amount="500">500</button>
      <button type="button" class="wager-chip" data-amount="1000">1000</button>
    </div>
    <button class="btn btn-ember btn-block" id="start-btn">配る</button>
    <div style="display:flex; gap: 10px; margin-top: 12px; flex-wrap: wrap;">
      <button class="btn btn-ghost" id="war-btn" style="flex:1;" disabled>War(倍賭け)</button>
      <button class="btn btn-ghost" id="surrender-btn" style="flex:1;" disabled>降参(半分回収)</button>
    </div>
  </div>

  <div>
    <div class="game-stage" style="flex-direction: column; gap: 24px;">
      <div style="display:flex; gap: 40px; flex-wrap: wrap;">
        <div style="text-align:center;">
          <div class="eyebrow">Dealer</div>
          <div class="mono" id="dealer-card" style="font-size: 40px;">--</div>
        </div>
        <div style="text-align:center;">
          <div class="eyebrow">You</div>
          <div class="mono" id="player-card" style="font-size: 40px;">--</div>
        </div>
      </div>
      <div class="result-readout" id="result-readout"></div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/war.js') }}"></script>
{% endblock %}
