{% extends "base.html" %}
{% block title %}Fishing Pond ・ EMBERPLAY{% endblock %}

{% block content %}
<span class="eyebrow">🎣 Fishing Pond</span>
<h1>Fishing Pond</h1>
<p>釣竿を垂らして何が釣れるかお楽しみ。レアな魚ほど高配当です。</p>

<div class="game-layout">
  <div class="panel">
    <div class="field">
      <label for="wager">プレイ料</label>
      <input type="number" id="wager" value="100" min="1">
    </div>
    <button class="btn btn-ember btn-block" id="fish-btn">釣る</button>
    <hr class="divider">
    <p style="font-size: 12px;">{% for f in fish %}{{ f.label }}={{ f.payout }}x　{% endfor %}</p>
  </div>

  <div>
    <div class="game-stage" style="flex-direction: column; gap: 16px;">
      <div id="catch-display" style="font-size: 64px;">🎣</div>
      <div class="result-readout" id="result-readout"></div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/fishing.js') }}"></script>
{% endblock %}
