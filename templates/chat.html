{% extends "base.html" %}
{% block title %}チャット ・ EMBERPLAY{% endblock %}

{% block content %}
<span class="eyebrow">みんなで話そう</span>
<h1>チャット</h1>

<div class="panel" style="padding: 0; display: flex; flex-direction: column; height: 60vh;">
  <div id="chat-messages" style="flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 10px;"></div>
  <form id="chat-form" style="display:flex; gap: 10px; padding: 16px 20px; border-top: 1px solid var(--panel-border); flex-wrap: wrap;">
    <input type="text" id="chat-input" maxlength="500" placeholder="メッセージを入力..." style="flex:1; padding: 12px 14px; border-radius: 8px; border: 1px solid var(--panel-border); background: var(--bg-raised); color: var(--text);">
    <button type="submit" class="btn btn-ember">送信</button>
  </form>
</div>
{% endblock %}

{% block scripts %}
<script>window.EMBERPLAY_REACTION_EMOJIS = {{ reaction_emojis | tojson }};</script>
<script src="{{ url_for('static', filename='js/chat.js') }}"></script>
{% endblock %}
