{% extends "base.html" %}
{% block title %}{{ song.title }} ・ EMBERPLAY{% endblock %}

{% block head %}
<style>
  #rhythm-stage { position: relative; width: 100%; height: 320px; background: #0d1410; border-radius: 12px; overflow: hidden; margin-bottom: 12px; touch-action: manipulation; }
  #rhythm-lanes { position: absolute; inset: 0; display: grid; grid-template-columns: repeat({{ lanes }}, 1fr); }
  .rhythm-lane { position: relative; border-left: 1px solid rgba(255,255,255,0.08); }
  .rhythm-hitline { position: absolute; bottom: 50px; left:0; right:0; height: 3px; background: var(--gold); box-shadow: 0 0 8px var(--gold); }
  .rhythm-note {
    position: absolute; left: 6px; right: 6px; height: 22px; border-radius: 6px;
    background: linear-gradient(180deg, var(--ember-bright), var(--ember)); box-shadow: 0 2px 6px rgba(0,0,0,0.5);
  }
  .rhythm-note.rhythm-note-hold {
    height: 22px;
  }
  .rhythm-note.rhythm-note-hold::before {
    content: ""; position: absolute; left: 25%; right: 25%; bottom: 100%; height: var(--tail-length, 40px);
    background: repeating-linear-gradient(
      180deg, rgba(212,162,78,0.85) 0px, rgba(212,162,78,0.85) 8px,
      rgba(232,89,12,0.55) 8px, rgba(232,89,12,0.55) 16px
    );
    border-radius: 50% / 8px; box-shadow: 0 0 6px rgba(212,162,78,0.6);
    transform-origin: bottom center;
    animation: rhythm-tail-bend 1.4s ease-in-out infinite;
  }
  @keyframes rhythm-tail-bend {
    0%, 100% { border-radius: 60% 40% / 8px 8px 4px 4px; transform: skewX(-3deg); }
    50% { border-radius: 40% 60% / 8px 8px 4px 4px; transform: skewX(3deg); }
  }
  .rhythm-note.rhythm-note-hold::after {
    content: "🔒"; position: absolute; top: -18px; left: 50%; transform: translateX(-50%); font-size: 10px;
  }
  .rhythm-note.holding::before {
    background: repeating-linear-gradient(
      180deg, rgba(76,175,109,0.9) 0px, rgba(76,175,109,0.9) 8px,
      rgba(212,162,78,0.7) 8px, rgba(212,162,78,0.7) 16px
    );
    animation: rhythm-tail-bend 0.5s ease-in-out infinite; /* 押している間は少し速く波打たせて「効いている」感を出す */
  }
  .rhythm-note.holding {
    background: linear-gradient(180deg, var(--gold), var(--ember)); box-shadow: 0 0 14px rgba(212,162,78,0.8);
  }
  .rhythm-judge { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); font-size: 13px; font-weight: 800; animation: rhythm-judge-pop 0.4s ease forwards; white-space: nowrap; }
  @keyframes rhythm-judge-pop { 0% { opacity:1; transform: translateX(-50%) translateY(0); } 100% { opacity:0; transform: translateX(-50%) translateY(-20px); } }
  #rhythm-tap-buttons { display: grid; grid-template-columns: repeat({{ lanes }}, 1fr); gap: 8px; margin-bottom: 12px; touch-action: manipulation; }
  .rhythm-tap-btn { height: 60px; border-radius: 12px; border: 2px solid var(--panel-border); background: var(--bg-raised); font-size: 22px; position: relative; overflow: visible; touch-action: manipulation; -webkit-user-select: none; user-select: none; }
  .rhythm-tap-btn:active { background: var(--ember); }
  .rhythm-tap-btn.hit-perfect { animation: rhythm-btn-flash-perfect 0.3s ease; }
  .rhythm-tap-btn.hit-good { animation: rhythm-btn-flash-good 0.3s ease; }
  @keyframes rhythm-btn-flash-perfect {
    0% { transform: scale(1); box-shadow: 0 0 0 rgba(212,162,78,0); }
    30% { transform: scale(1.15); box-shadow: 0 0 22px rgba(212,162,78,0.9); background: var(--gold); }
    100% { transform: scale(1); box-shadow: 0 0 0 rgba(212,162,78,0); }
  }
  @keyframes rhythm-btn-flash-good {
    0% { transform: scale(1); box-shadow: 0 0 0 rgba(76,175,109,0); }
    30% { transform: scale(1.1); box-shadow: 0 0 16px rgba(76,175,109,0.8); background: var(--win); }
    100% { transform: scale(1); box-shadow: 0 0 0 rgba(76,175,109,0); }
  }
  .rhythm-lane.hit-flash::after {
    content: ""; position: absolute; inset: 0; background: rgba(212,162,78,0.25);
    animation: rhythm-lane-flash 0.3s ease-out forwards; pointer-events: none;
  }
  @keyframes rhythm-lane-flash { 0% { opacity: 1; } 100% { opacity: 0; } }
  .rhythm-burst {
    position: absolute; bottom: 46px; left: 50%; width: 10px; height: 10px; border-radius: 50%;
    border: 3px solid var(--gold); transform: translate(-50%, 50%); animation: rhythm-burst-expand 0.4s ease-out forwards;
    pointer-events: none;
  }
  @keyframes rhythm-burst-expand {
    0% { width: 10px; height: 10px; opacity: 1; }
    100% { width: 60px; height: 60px; opacity: 0; }
  }
  .rhythm-particle {
    position: absolute; bottom: 50px; left: 50%; font-size: 14px; pointer-events: none;
    animation: rhythm-particle-fly 0.5s ease-out forwards;
  }
  @keyframes rhythm-particle-fly {
    0% { transform: translate(-50%, 0) scale(1); opacity: 1; }
    100% { transform: translate(calc(-50% + var(--px, 0px)), -40px) scale(0.6); opacity: 0; }
  }
  #combo-display.combo-milestone { display: inline-block; animation: rhythm-combo-pop 0.4s ease; color: var(--gold); }
  @keyframes rhythm-combo-pop { 0% { transform: scale(1.6); } 100% { transform: scale(1); } }
  .rhythm-combo-banner {
    position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 22px; font-weight: 900;
    color: var(--gold); text-shadow: 0 0 12px rgba(212,162,78,0.9), 0 2px 4px rgba(0,0,0,0.8);
    animation: rhythm-combo-banner-pop 0.9s ease-out forwards; pointer-events: none; z-index: 20; white-space: nowrap;
  }
  @keyframes rhythm-combo-banner-pop {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.4) rotate(-8deg); }
    25% { opacity: 1; transform: translate(-50%, -50%) scale(1.2) rotate(4deg); }
    40% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
    80% { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -60%) scale(1); }
  }
  #yt-player-wrap { width: 100%; max-width: 320px; margin: 0 auto 12px; }

  #rhythm-game-container:fullscreen,
  #rhythm-game-container:-webkit-full-screen {
    background: var(--bg); padding: 16px; display: flex; flex-direction: column; justify-content: center;
    height: 100%;
  }
  #rhythm-game-container:fullscreen #rhythm-stage,
  #rhythm-game-container:-webkit-full-screen #rhythm-stage {
    height: 50vh;
  }

  /* iOS Safari等、要素単位のFullscreen APIに対応していないブラウザ向けの疑似フルスクリーン */
  #rhythm-game-container.pseudo-fullscreen {
    position: fixed; inset: 0; z-index: 9999; background: var(--bg);
    padding: 16px; display: flex; flex-direction: column; justify-content: center;
    overflow-y: auto;
  }
  #rhythm-game-container.pseudo-fullscreen #rhythm-stage { height: 45vh; }
  body.pseudo-fullscreen-active { overflow: hidden; }
</style>
{% endblock %}

{% block content %}
<span class="eyebrow">🎵 {{ difficulty_label }}</span>
<h1>{{ song.title }}</h1>
<button type="button" class="btn btn-ghost" id="fullscreen-btn" style="margin-bottom: 10px;">⛶ フルスクリーン</button>

<div id="rhythm-game-container">
  <div id="yt-player-wrap"><div id="yt-player"></div></div>

  <div style="display:flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px;">
    <span>スコア: <strong id="score-display">0</strong></span>
    <span>コンボ: <strong id="combo-display">0</strong></span>
  </div>

  <div id="rhythm-stage">
    <div id="rhythm-lanes"></div>
  </div>

  <div id="rhythm-tap-buttons"></div>

  <div id="rhythm-result" class="panel" style="display:none; text-align:center;"></div>
</div>

<a href="{{ url_for('rhythm.index') }}" class="btn btn-ghost btn-block" style="margin-top: 12px;">曲選択に戻る</a>
{% endblock %}

{% block scripts %}
<script src="https://www.youtube.com/iframe_api"></script>
<script>
  const SONG_ID = {{ song.id }};
  const DIFFICULTY = "{{ difficulty }}";
  const PLAY_SECONDS = {{ play_seconds }};
  const LANES = {{ lanes }};
  const NOTES = {{ notes_json | tojson }};
  const NOTE_TRAVEL_TIME = 2.2;
  const HIT_WINDOW = 0.18;

  const lanesEl = document.getElementById("rhythm-lanes");
  const tapButtonsEl = document.getElementById("rhythm-tap-buttons");
  const scoreDisplay = document.getElementById("score-display");
  const comboDisplay = document.getElementById("combo-display");
  const resultPanel = document.getElementById("rhythm-result");

  for (let i = 0; i < LANES; i++) {
    const lane = document.createElement("div");
    lane.className = "rhythm-lane";
    lane.dataset.lane = i;
    const hitline = document.createElement("div");
    hitline.className = "rhythm-hitline";
    lane.appendChild(hitline);
    lanesEl.appendChild(lane);

    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "rhythm-tap-btn";
    btn.textContent = "👆";
    btn.dataset.lane = i;
    btn.addEventListener("pointerdown", (e) => { e.preventDefault(); laneIsPressed[i] = true; pressLane(i); });
    btn.addEventListener("pointerup", (e) => { e.preventDefault(); laneIsPressed[i] = false; releaseLane(i); });
    btn.addEventListener("pointercancel", () => { laneIsPressed[i] = false; releaseLane(i); });
    btn.addEventListener("pointerleave", () => { laneIsPressed[i] = false; releaseLane(i); });
    tapButtonsEl.appendChild(btn);
  }

  let score = 0, combo = 0, maxCombo = 0;
  let player = null;
  let started = false;
  let noteElements = [];

  function onYouTubeIframeAPIReady() {
    player = new YT.Player("yt-player", {
      height: "180", width: "320", videoId: "{{ song.youtube_id }}",
      playerVars: { autoplay: 0, controls: 0 },
      events: {
        onReady: () => {
          player.playVideo();
          started = true;
          resyncClock();
          requestAnimationFrame(gameLoop);
          // getCurrentTime()はYouTube側とのpostMessage通信を伴い、毎フレーム呼ぶと処理落ちの原因になるため、
          // 数秒おきにだけ実際の再生位置と照合してズレを補正する(体感の同期は保ったまま軽くする)
          setInterval(resyncClock, 2000);
        },
      },
    });
  }
  window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady;

  // ローカルの時計(performance.now())を基準に進行時間を計算し、数秒おきだけYouTube側の実際の再生位置と照合する
  let syncBaseVideoTime = 0;
  let syncBaseWallClock = 0;

  function resyncClock() {
    if (!player || !player.getCurrentTime) return;
    syncBaseVideoTime = player.getCurrentTime();
    syncBaseWallClock = performance.now();
  }

  function currentTime() {
    if (!player) return 0;
    return syncBaseVideoTime + (performance.now() - syncBaseWallClock) / 1000;
  }

  const stageEl = document.getElementById("rhythm-stage"); // 毎フレームDOM検索しないようキャッシュしておく
  let nextSpawnIndex = 0; // まだ画面に出していないノーツの先頭位置(毎フレーム全件スキャンしないため)
  let cachedHitlineY = stageEl.offsetHeight - 50; // レイアウト再計算(reflow)を毎フレーム発生させないようキャッシュ
  const laneIsPressed = {}; // 各レーンで、指が実際に押され続けているかどうか(離しイベントが取りこぼされても検知できるようにする)
  window.addEventListener("resize", () => { cachedHitlineY = stageEl.offsetHeight - 50; });

  function gameLoop() {
    if (!started) return;
    const t = currentTime();

    // NOTESは時間順に並んでいるため、次に出すべきノーツから順番に見ていくだけでよい
    // (既に出し終わったノーツを毎フレーム再チェックする必要が無くなり、負荷が大きく下がる)
    while (nextSpawnIndex < NOTES.length && t >= NOTES[nextSpawnIndex].time - NOTE_TRAVEL_TIME) {
      const note = NOTES[nextSpawnIndex];
      const el = document.createElement("div");
      el.className = "rhythm-note" + (note.hold ? " rhythm-note-hold" : "");
      el.style.top = "-24px";
      if (note.hold) {
        // ノーツが1秒間に進む距離(px)を基準に、保持時間に応じた尻尾の長さをピクセルで正確に計算する
        // (CSSのパーセント指定だとノーツ本体の高さ(22px)基準になってしまい、ほぼ見えなくなるため)
        const pxPerSecond = cachedHitlineY / NOTE_TRAVEL_TIME;
        const tailLengthPx = Math.max(20, note.hold * pxPerSecond);
        el.style.setProperty("--tail-length", tailLengthPx + "px");
      }
      lanesEl.children[note.lane].appendChild(el);
      noteElements.push({ note, el, judged: false });
      nextSpawnIndex++;
    }

    const hitlineY = cachedHitlineY;
    let anyJudgedThisFrame = false;
    for (let i = 0; i < noteElements.length; i++) {
      const n = noteElements[i];
      if (n.judged) continue;

      if (n.holding) {
        // 押しっぱなしイベントが取りこぼされていないか、毎フレーム実際の押下状態を確認する
        // (これが無いと、指を離してもタイマーの時間経過だけで自動成功になってしまう)
        if (!laneIsPressed[n.note.lane]) {
          n.judged = true;
          n.el.remove();
          combo = 0;
          comboDisplay.textContent = "0";
          showJudge(n.note.lane, "MISS", "var(--loss)");
          anyJudgedThisFrame = true;
          continue;
        }
        // 長押し中は判定ラインに固定表示し、指を離さずに最後まで到達したら成功にする
        n.el.style.top = hitlineY + "px";
        if (t >= n.note.time + n.note.hold) {
          resolveHit(n, n.note.lane, n.holdStartDiff);
          anyJudgedThisFrame = true;
        }
        continue;
      }

      const progress = (t - (n.note.time - NOTE_TRAVEL_TIME)) / NOTE_TRAVEL_TIME;
      n.el.style.top = (progress * hitlineY) + "px";
      if (t > n.note.time + HIT_WINDOW + 0.15) {
        n.judged = true;
        combo = 0;
        comboDisplay.textContent = "0";
        showJudge(n.note.lane, "MISS", "var(--loss)");
        n.el.remove();
        anyJudgedThisFrame = true;
      }
    }
    // 実際に何か判定が確定した時だけ配列を作り直す(毎フレームの無駄な複製をなくす)
    if (anyJudgedThisFrame) {
      noteElements = noteElements.filter((n) => !n.judged);
    }

    if (t >= PLAY_SECONDS) {
      finishSong();
      return;
    }
    requestAnimationFrame(gameLoop);
  }

  function showJudge(lane, text, color) {
    const el = document.createElement("div");
    el.className = "rhythm-judge";
    el.textContent = text;
    el.style.color = color;
    el.style.bottom = "56px";
    lanesEl.children[lane].appendChild(el);
    setTimeout(() => el.remove(), 400);
  }

  function spawnHitBurst(lane) {
    const laneEl = lanesEl.children[lane];
    const burst = document.createElement("div");
    burst.className = "rhythm-burst";
    laneEl.appendChild(burst);
    setTimeout(() => burst.remove(), 400);

    const emojis = ["✨", "⭐"];
    for (let i = 0; i < 2; i++) {
      const p = document.createElement("div");
      p.className = "rhythm-particle";
      p.textContent = emojis[i % emojis.length];
      p.style.setProperty("--px", `${(Math.random() * 50 - 25)}px`);
      laneEl.appendChild(p);
      setTimeout(() => p.remove(), 500);
    }

    laneEl.classList.remove("hit-flash");
    void laneEl.offsetWidth;
    laneEl.classList.add("hit-flash");
    setTimeout(() => laneEl.classList.remove("hit-flash"), 300);
  }

  function showComboBanner(combo) {
    const el = document.createElement("div");
    el.className = "rhythm-combo-banner";
    el.textContent = `🔥 ${combo} COMBO!`;
    document.getElementById("rhythm-stage").appendChild(el);
    setTimeout(() => el.remove(), 900);
  }

  function flashTapButton(lane, perfect) {
    const btn = tapButtonsEl.children[lane];
    if (!btn) return;
    btn.classList.remove("hit-perfect", "hit-good");
    void btn.offsetWidth;
    btn.classList.add(perfect ? "hit-perfect" : "hit-good");
  }

  function resolveHit(n, lane, bestDiff) {
    n.judged = true;
    n.el.remove();
    const perfect = bestDiff <= HIT_WINDOW * 0.4;
    combo += 1;
    maxCombo = Math.max(maxCombo, combo);
    score += perfect ? 300 : 150;
    scoreDisplay.textContent = String(score);
    comboDisplay.textContent = String(combo);
    showJudge(lane, perfect ? "PERFECT" : "GOOD", perfect ? "var(--gold)" : "var(--win)");
    spawnHitBurst(lane);
    flashTapButton(lane, perfect);
    if (combo > 0 && combo % 10 === 0) {
      comboDisplay.classList.remove("combo-milestone");
      void comboDisplay.offsetWidth;
      comboDisplay.classList.add("combo-milestone");
    }
    if (combo > 0 && combo % 50 === 0) {
      showComboBanner(combo);
    }
    // 配列からの削除はここでは行わない(gameLoopのループ中に呼ばれる場合があり、
    // その場でfilterして配列を作り直すとループのインデックスと矛盾するため)。
    // n.judged = true を見て、呼び出し元がまとめて掃除する。
  }

  function pressLane(lane) {
    const t = currentTime();
    let best = null, bestDiff = Infinity;
    noteElements.forEach((n) => {
      if (n.judged || n.holding || n.note.lane !== lane) return;
      const diff = Math.abs(t - n.note.time);
      if (diff < bestDiff) { bestDiff = diff; best = n; }
    });
    if (!best || bestDiff > HIT_WINDOW) return;

    if (best.note.hold) {
      // ロングノーツ: 押しっぱなしにする。判定はreleaseLane、または離さずに最後まで到達した時に行う
      best.holding = true;
      best.holdStartDiff = bestDiff;
      best.el.classList.add("holding");
    } else {
      resolveHit(best, lane, bestDiff);
      noteElements = noteElements.filter((n) => !n.judged);
    }
  }

  function releaseLane(lane) {
    const t = currentTime();
    const held = noteElements.find((n) => n.holding && n.note.lane === lane);
    if (!held) return;

    const heldRatio = (t - held.note.time) / held.note.hold;
    if (heldRatio >= 0.7) {
      resolveHit(held, lane, held.holdStartDiff);
    } else {
      // 早く離しすぎた場合はミス扱い
      held.judged = true;
      held.el.remove();
      combo = 0;
      comboDisplay.textContent = "0";
      showJudge(lane, "MISS", "var(--loss)");
    }
    noteElements = noteElements.filter((n) => !n.judged);
  }

  // ───────── フルスクリーン切り替え(iOS Safari等、要素単位のFullscreen APIが使えない場合は疑似フルスクリーンにフォールバック) ─────────
  const fullscreenBtn = document.getElementById("fullscreen-btn");
  const gameContainer = document.getElementById("rhythm-game-container");
  if (fullscreenBtn && gameContainer) {
    const supportsRealFullscreen = !!(
      gameContainer.requestFullscreen || gameContainer.webkitRequestFullscreen
    );

    function setBtnLabel(isFs) {
      fullscreenBtn.textContent = isFs ? "⛶ フルスクリーン解除" : "⛶ フルスクリーン";
    }

    function enterPseudoFullscreen() {
      gameContainer.classList.add("pseudo-fullscreen");
      document.body.classList.add("pseudo-fullscreen-active");
      setBtnLabel(true);
    }
    function exitPseudoFullscreen() {
      gameContainer.classList.remove("pseudo-fullscreen");
      document.body.classList.remove("pseudo-fullscreen-active");
      setBtnLabel(false);
    }

    fullscreenBtn.addEventListener("click", () => {
      const isFullscreen = document.fullscreenElement || document.webkitFullscreenElement;
      const isPseudo = gameContainer.classList.contains("pseudo-fullscreen");

      if (isPseudo) { exitPseudoFullscreen(); return; }
      if (isFullscreen) {
        if (document.exitFullscreen) document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        return;
      }

      if (supportsRealFullscreen) {
        const req = gameContainer.requestFullscreen ? gameContainer.requestFullscreen() : gameContainer.webkitRequestFullscreen();
        // iOSの一部バージョンではPromiseが拒否されることがあるため、失敗したら疑似フルスクリーンに切り替える
        if (req && req.catch) req.catch(() => enterPseudoFullscreen());
      } else {
        // iOS Safariなど、要素単位のフルスクリーンAPIが無いブラウザ向け
        enterPseudoFullscreen();
      }
    });
    document.addEventListener("fullscreenchange", () => {
      setBtnLabel(!!document.fullscreenElement);
    });
    document.addEventListener("webkitfullscreenchange", () => {
      setBtnLabel(!!document.webkitFullscreenElement);
    });
  }

  async function finishSong() {
    resultPanel.style.display = "block";
    resultPanel.innerHTML = `<h3>🎉 リザルト</h3><p>スコア: ${score}<br>最大コンボ: ${maxCombo}(10コンボごとに500pt)</p>`;
    try {
      const data = await EmberPlay.postJSON("/rhythm/submit-score", {
        song_id: SONG_ID, difficulty: DIFFICULTY, score, max_combo: maxCombo, play_seconds: PLAY_SECONDS, bpm: {{ song.bpm }},
      });
      resultPanel.innerHTML += `<p style="color: var(--win); font-weight:700;">+${data.reward} Embers(最大コンボ${maxCombo}に基づく報酬)</p>`;
      EmberPlay.updateBalance(data.balance, "win");
    } catch (err) {
      resultPanel.innerHTML += `<p class="text-loss">${err.message}</p>`;
    }
  }
</script>
{% endblock %}
