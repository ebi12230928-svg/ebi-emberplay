{% extends "base.html" %}
{% block title %}お知らせ掲示板 ・ EMBERPLAY{% endblock %}

{% block content %}
<span class="eyebrow">掲示板</span>
<h1>お知らせ</h1>

<div class="panel" style="padding: 0;">
  {% for a in items %}
  <div style="padding: 16px 20px; border-bottom: 1px solid var(--panel-border);">
    <p style="margin: 0 0 4px; white-space: pre-wrap;">{{ a.message }}</p>
    <span class="mono text-muted" style="font-size: 12px;">{{ a.created_by }} ・ {{ a.created_at.strftime("%Y/%m/%d %H:%M") }}</span>
  </div>
  {% else %}
  <div style="padding: 20px;"><p class="text-muted" style="margin:0;">まだお知らせはありません。</p></div>
  {% endfor %}
</div>
{% endblock %}
